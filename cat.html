<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* 清楚列表所有风格 */
    
    ul,
    ol {
        list-style: none;
    }
    
    .box {
        width: 1000px;
        margin: 100px auto;
        position: relative;
        overflow: hidden;
    }
    /* 兼容谷歌和苹果浏览器的隐藏滚动条 */
    
    .box::before,
    .box::after {
        content: '';
        position: absolute;
        left: 0px;
        background: white;
        width: 100%;
        height: 100px;
        border-radius: 50%;
        text-align: center;
        color: #000;
    }
    
    .box::before {
        top: -50px;
        content: '小猫~~~';
        line-height: 130px;
    }
    
    .box::after {
        bottom: -50px;
        content: '小猫在这里';
        line-height: 60px;
    }
    
    .box ul {
        display: flex;
        /* position: absolute; */
        gap: 10px;
        overflow-x: scroll;
        scrollbar-width: none;
    }
    
    .box ul li {
        flex: 0 0 200px;
    }
    
    .box ul li img {
        width: 100%;
        height: 200px;
    }
</style>

<body>
    <div class="box">
        <ul>
            <li>
                <a href=""><img src="./cat/cat_1.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_2.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_3.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_4.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_5.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_6.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_7.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_8.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_9.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_10.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_11.jpg" alt=""></a>
            </li>
            <li>
                <a href=""><img src="./cat/cat_12.jpg" alt=""></a>
            </li>
        </ul>
    </div>
    <script>
        // 获取可滚动的容器
        const scrollContainer = document.querySelector('.box ul');
        // 监听鼠标滚轮事件
        scrollContainer.addEventListener('wheel', (e) => {
            // 阻止默认的垂直滚动行为
            e.preventDefault();
            // 根据滚轮的垂直滚动量（deltaY）调整横向滚动量（scrollLeft）
            // 乘以系数（如 1.5）可调整滚动灵敏度
            scrollContainer.scrollLeft += e.deltaY * 1.5;
        });
    </script>
</body>

</html>
