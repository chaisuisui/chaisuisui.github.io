<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background: purple;
        }
        
        .box1 {
            position: absolute;
            width: 120px;
            height: 120px;
            background: skyblue;
        }
        
        .box2 {
            width: 150px;
            height: 150px;
            background: pink;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>

</html>
