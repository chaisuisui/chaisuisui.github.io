<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    
    .box {
        display: grid;
        grid-auto-flow: column;
        /* grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); */
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 1fr 1fr;
        max-width: 1760px;
        margin: 100px auto;
        background: pink;
        gap: 20px;
        padding: 20px;
        border-radius: 20px;
    }
    
    .box img {
        display: block;
        width: 100%;
        height: 100%;
        background: skyblue;
        /* object-fit: contain; */
        object-fit: cover;
    }
    
    .box .garden:first-child {
        grid-column: 1 / 2;
        grid-row: 1 / 3;
    }
    
    .box .garden:nth-child(3) {
        grid-column: 2 / 4;
        grid-row: 2 / 3;
    }
</style>

<body>
    <div class="box">
        <div class="garden">
            <img src="./garden/garden1.jpg" alt="">
        </div>
        <div class="garden">
            <img src="./garden/garden2.jpg" alt="">
        </div>
        <div class="garden">
            <img src="./garden/garden3.jpg" alt="">
        </div>
        <div class="garden">
            <img src="./garden/garden4.jpg" alt="">
        </div>
    </div>
</body>

</html>
