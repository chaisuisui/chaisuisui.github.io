<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .box {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            max-width: 1200px;
            border: 1px solid red;
            margin: 100px auto;
            gap: 18px;
        }
        
        .box .item {
            height: 120px;
            background: pink;
        }
        
        .box .item img {
            display: block;
            /* height: 120px; */
            height: 100%;
            width: 100%;
        }
        
        .box .item:first-child {
            grid-column: 1 / span 2;
            grid-row: 1 / span 2;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item"><img src="./cat/cat_0.jpg" alt="cat 0"></div>
        <div class="item"><img src="./cat/cat_1.jpg" alt="cat 1"></div>
        <div class="item"><img src="./cat/cat_2.jpg" alt="cat 2"></div>
        <div class="item"><img src="./cat/cat_3.jpg" alt="cat 3"></div>
        <div class="item"><img src="./cat/cat_4.jpg" alt="cat 4"></div>
        <div class="item"><img src="./cat/cat_5.jpg" alt="cat 5"></div>
        <div class="item"><img src="./cat/cat_6.jpg" alt="cat 6"></div>
        <div class="item"><img src="./cat/cat_7.jpg" alt="cat 7"></div>
        <div class="item"><img src="./cat/cat_8.jpg" alt="cat 8"></div>
        <div class="item"><img src="./cat/cat_9.jpg" alt="cat 9"></div>
        <div class="item"><img src="./cat/cat_10.jpg" alt="cat 10"></div>
        <div class="item"><img src="./cat/cat_11.jpg" alt="cat 11"></div>

    </div>
</body>

</html>
